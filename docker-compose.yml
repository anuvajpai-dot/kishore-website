version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kishore_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://kishore:${DB_PASSWORD}@postgres:5432/kishore_photography"
      NEXTAUTH_URL: "https://pihudrive.lol"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      ADMIN_EMAILS: "${ADMIN_EMAILS}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kishore_net

  postgres:
    image: postgres:15-alpine
    container_name: kishore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kishore_photography
      POSTGRES_USER: kishore
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kishore -d kishore_photography"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kishore_net

  nginx:
    image: nginx:alpine
    container_name: kishore_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Cloudflare Origin Certificate — generated once from Cloudflare Dashboard.
      # Place origin.crt and origin.key in ./nginx/ssl/ before running docker compose up.
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - kishore_net

volumes:
  postgres_data:

networks:
  kishore_net:
    driver: bridge
